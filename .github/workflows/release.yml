name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  # Create the release once before the matrix fans out — five concurrent
  # jobs racing to create it hit GitHub's eventual consistency and one can
  # end up uploading to an orphaned duplicate draft.
  create-release:
    runs-on: ubuntu-latest
    steps:
      - name: Ensure release exists for tag
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --repo "${{ github.repository }}" \
            --title "${{ github.ref_name }}" \
            --notes "" || true

  build:
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            target: aarch64-apple-darwin
          - os: macos-14
            target: x86_64-apple-darwin
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Install aarch64 linux cross linker
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"
      - name: Build server
        run: cargo build --release --manifest-path server/Cargo.toml --target ${{ matrix.target }}
      - name: Package (unix)
        if: runner.os != 'Windows'
        run: |
          cd server/target/${{ matrix.target }}/release
          tar -czf "$GITHUB_WORKSPACE/renpy-language-server-${{ github.ref_name }}-${{ matrix.target }}.tar.gz" renpy-language-server
      - name: Package (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path "server/target/${{ matrix.target }}/release/renpy-language-server.exe" -DestinationPath "renpy-language-server-${{ github.ref_name }}-${{ matrix.target }}.zip"
      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: renpy-language-server-${{ github.ref_name }}-${{ matrix.target }}.*
